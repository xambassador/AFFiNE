[graph]
all-features = true
exclude-dev = true
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
  "aarch64-linux-android",
  "aarch64-apple-ios",
  "aarch64-apple-ios-sim",
]

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.93
unused-allowed-license = "allow"
version = 2

  [[licenses.exceptions]]
  allow = ["AGPL-3.0-only"]
  crate = "llm_adapter"

  [[licenses.exceptions]]
  allow = ["AGPL-3.0-or-later"]
  crate = "memory-indexer"

  [[licenses.exceptions]]
  allow = ["AGPL-3.0-or-later"]
  crate = "path-ext"

  [licenses.private]
  ignore = true

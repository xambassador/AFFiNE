mutation submitTranscriptTask(
  $workspaceId: String!
  $blobId: String!
  $blob: Upload
  $blobs: [Upload!]
  $input: SubmitAudioTranscriptionInput
) {
  submitTranscriptTask(
    blob: $blob
    blobs: $blobs
    blobId: $blobId
    workspaceId: $workspaceId
    input: $input
  ) {
    id
    status
  }
}
